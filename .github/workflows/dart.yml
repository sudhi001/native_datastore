# Build runs on every push/PR to main.
# Publish runs only when the commit message matches "RELEASE x.y.z".

name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Check coverage
        run: |
          TOTAL=$(grep -c '^DA:' coverage/lcov.info)
          HITS=$(grep -c '^DA:.*,[1-9]' coverage/lcov.info)
          echo "Coverage: $HITS/$TOTAL lines"
          if [ "$HITS" -ne "$TOTAL" ]; then
            echo "::error::Coverage is not 100% ($HITS/$TOTAL lines covered)"
            grep '^DA:.*,0$' coverage/lcov.info
            exit 1
          fi

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'RELEASE ')
    permissions:
      id-token: write  # Required for pub.dev OIDC authentication

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP '^RELEASE \K[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from commit message"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Verify pubspec version matches
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ "$PUBSPEC_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::pubspec.yaml version ($PUBSPEC_VERSION) does not match commit version (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Dry run publish
        run: flutter pub publish --dry-run

      - name: Publish to pub.dev
        run: flutter pub publish --force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
