# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Check coverage
        run: |
          # Ensure 100% line coverage
          TOTAL=$(grep -c '^DA:' coverage/lcov.info)
          HITS=$(grep -c '^DA:.*,[1-9]' coverage/lcov.info)
          echo "Coverage: $HITS/$TOTAL lines"
          if [ "$HITS" -ne "$TOTAL" ]; then
            echo "::error::Coverage is not 100% ($HITS/$TOTAL lines covered)"
            grep '^DA:.*,0$' coverage/lcov.info
            exit 1
          fi
          echo "✅ 100% line coverage"
